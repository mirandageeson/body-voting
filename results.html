  <style>

      display:block;

    .note{
      color:#6b7280;
      font-size:14px;
      margin-top:10px;
    }
    h2 { margin-bottom: 12px; }

    /* --- RESET ICON BUTTON --- */
    #resetVotesBtn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
    }
    #resetVotesBtn:hover svg {
      stroke: #000;
    }
  </style>

<body>

<!-- Reset button (top-right corner) -->
<button id="resetVotesBtn" title="Reset all votes">
  <svg width="30" height="30" viewBox="0 0 24 24" fill="none"
       stroke="#555" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="1 4 1 10 7 10"></polyline>
    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
  </svg>
</button>

<h2>Live Results</h2>

<svg id="sil" viewBox="0 0 1505 4279" preserveAspectRatio="xMidYMid meet"></svg>

<div class="note">Colours update automatically as votes come in.</div>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js";

  const SUPABASE_URL  = "https://awrcxuahafelpmhnwekm.supabase.co";
  const SUPABASE_ANON = "sb_publishable_09CHP1nkTxUbdQgNNLmdSA_w3fV4tE-";
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

  const COLOURS = {
    green : "#2ecc71",
    yellow: "#f1c40f",
    orange: "#e67e22",
    brown : "#8e5c2a",
    red   : "#e74c3c"
  };

  // --- RESET ALL VOTES FUNCTION ---
  async function resetVotes() {
    if (!confirm("Are you sure you want to reset ALL votes?")) return;

    const { error } = await supabase.from("votes").delete().neq("id", 0);
    if (error) {
      alert("Error resetting votes.");
      console.error(error);
      return;
    }
    alert("Votes reset.");
    refresh();
  }

  document.getElementById("resetVotesBtn").addEventListener("click", resetVotes);

  // --- FETCH + CALCULATE REGION WINNERS ---
  async function refresh(){
    const { data, error } = await supabase.from("votes").select("region,colour");
    if (error) return;

    const regions = {
      "Head & Neck":         { green:0,yellow:0,orange:0,brown:0,red:0 },
      "Chest & Abdomen":     { green:0,yellow:0,orange:0,brown:0,red:0 },
      "Knee/Femur & Pelvis": { green:0,yellow:0,orange:0,brown:0,red:0 },
      "Lower Leg":           { green:0,yellow:0,orange:0,brown:0,red:0 }
    };

    for (const v of data) {
      if (regions[v.region] && COLOURS[v.colour]) {
        regions[v.region][v.colour]++;
      }
    }

    const fillMap = {};
    for (const r in regions) {
      const counts = regions[r];
      const top = Object.keys(counts).reduce((a,b)=> counts[a] > counts[b] ? a : b);
      fillMap[r] = COLOURS[top];
    }

    drawSilhouette(fillMap);
  }
