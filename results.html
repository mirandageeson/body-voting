<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Live Results</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --ink:#111827;        /* outline stroke */
      --bg:#f7f7f7;         /* page background */
    }
    body{
      font-family: Arial, Helvetica, sans-serif;
      padding: 24px;
      text-align: center;
      background: var(--bg);
    }
    #sil{ width: clamp(260px, 40vw, 420px); margin:auto; display:block;}
    .note{ color:#6b7280; font-size:14px; margin-top:10px;}
    h2 { margin-bottom: 12px; }
  </style>
</head>
<body>

<h2>Live Results</h2>
<!-- Taller viewBox for a graceful standing figure -->
<svg id="sil" viewBox="0 0 260 560" role="img" aria-label="Standing human silhouette"></svg>
<div class="note">Colours update automatically as votes come in.</div>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js";

  // ⬇️ REPLACE these two with your real Supabase values
  const SUPABASE_URL = "https://awrcxuahafelpmhnwekm.supabase.co";
  const SUPABASE_ANON = "sb_publishable_09CHP1nkTxUbdQgNNLmdSA_w3fV4tE-";
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

  const COLOURS = {
    green : "#2ecc71",
    yellow: "#f1c40f",
    orange: "#e67e22",
    brown : "#8e5c2a",
    red   : "#e74c3c"
  };

  async function refresh(){
    const { data, error } = await supabase.from("votes").select("region,colour");
    if (error) return;

    const regions = {
      "Head & Neck":         { green:0,yellow:0,orange:0,brown:0,red:0 },
      "Chest & Abdomen":     { green:0,yellow:0,orange:0,brown:0,red:0 },
      "Knee/Femur & Pelvis": { green:0,yellow:0,orange:0,brown:0,red:0 },
      "Lower Leg":           { green:0,yellow:0,orange:0,brown:0,red:0 }
    };
    for(const v of data){ if(regions[v.region] && COLOURS[v.colour]!==undefined){ regions[v.region][v.colour]++; } }

    const fillMap = {};
    for(const r in regions){
      const counts = regions[r];
      const top = Object.keys(counts).reduce((a,b)=>counts[a] > counts[b] ? a : b);
      fillMap[r] = COLOURS[top];
    }
    drawSilhouette(fillMap);
  }

  function drawSilhouette(fills){
    const svg = document.getElementById("sil");

    /* Standing silhouette (clean medical style)
       - Arms gently out and back in toward hands
       - Torso slightly tapered, pelvis narrower than shoulders
       - Legs straight with subtle taper; feet rounded
       - Shapes overlap subtly inside the clipPath to avoid gaps
    */

    const clip = `
      <clipPath id="humanClip" clipPathUnits="userSpaceOnUse">
        <!-- HEAD (oval) -->
        <ellipse cx="130" cy="58" rx="28" ry="36"/>

        <!-- NECK (narrow block) -->
        <rect x="118" y="92" width="24" height="18" rx="5" ry="5"/>

        <!-- TORSO CORE (rounded rectangle wider at shoulders) -->
        <path d="
          M80,110
          q 0,-22 22,-22
          h56
          q 22,0 22,22
          v76
          q 0,24 -21,36
          q -29,18 -58,0
          q -21,-12 -21,-36
          Z" />

        <!-- SHOULDERS SOFTENED (caps) -->
        <rect x="76"  y="108" width="18" height="20" rx="9" ry="9"/>
        <rect x="166" y="108" width="18" height="20" rx="9" ry="9"/>

        <!-- UPPER ARMS (curved outward) -->
        <path d="M76,128 q -18,22 -16,48 q 2,28 16,42 q 8,8 14,0 q -12,-14 -12,-38 q 0,-26 12,-52 Z" />
        <path d="M184,128 q 18,22 16,48 q -2,28 -16,42 q -8,8 -14,0 q 12,-14 12,-38 q 0,-26 -12,-52 Z" />

        <!-- FOREARMS + HANDS (curve inward near thighs) -->
        <path d="M74,218 q 8,18 20,26 q 10,6 10,16 q 0,10 -10,12 q -12,2 -20,-10 q -10,-14 -10,-28 q 0,-8 10,-16 Z" />
        <path d="M186,218 q -8,18 -20,26 q -10,6 -10,16 q 0,10 10,12 q 12,2 20,-10 q 10,-14 10,-28 q 0,-8 -10,-16 Z" />

        <!-- PELVIS / HIP BLOCK -->
        <path d="
          M92,218
          q 38,16 76,0
          v22
          q -10,14 -38,18
          q -28,-4 -38,-18
          Z" />

        <!-- THIGHS (taper gently) -->
        <rect x="102" y="258" width="28" height="120" rx="14" ry="14"/>
        <rect x="130" y="258" width="28" height="120" rx="14" ry="14"/>

        <!-- SHINS (slimmer) -->
        <rect x="106" y="378" width="22" height="108" rx="11" ry="11"/>
        <rect x="132" y="378" width="22" height="108" rx="11" ry="11"/>

        <!-- FEET (rounded blocks) -->
        <ellipse cx="117" cy="494" rx="18" ry="10"/>
        <ellipse cx="148" cy="494" rx="18" ry="10"/>
      </clipPath>
    `;

    /* Outline: a single path that follows the same silhouette.
       Stroke set to "medium" for presentation clarity.
    */
    const outline = `
      M130,22
      c 18,0 30,16 30,36
      s -12,36 -30,36
      s -30,-16 -30,-36
      s 12,-36 30,-36 Z

      M118,92 h24 v18 h-24 Z

      M80,110
      q 0,-22 22,-22 h56 q 22,0 22,22 v76
      q 0,24 -21,36 q -29,18 -58,0 q -21,-12 -21,-36 Z

      M76,128
      q -18,22 -16,48 q 2,28 16,42
      q 8,8 14,0
      q -12,-14 -12,-38 q 0,-26 12,-52 Z

      M184,128
      q 18,22 16,48 q -2,28 -16,42
      q -8,8 -14,0
      q 12,-14 12,-38 q 0,-26 -12,-52 Z

      M74,218
      q 8,18 20,26 q 10,6 10,16
      q 0,10 -10,12 q -12,2 -20,-10
      q -10,-14 -10,-28 q 0,-8 10,-16 Z

      M186,218
      q -8,18 -20,26 q -10,6 -10,16
      q 0,10 10,12 q 12,2 20,-10
      q 10,-14 10,-28 q 0,-8 -10,-16 Z

      M92,218
      q 38,16 76,0 v22
      q -10,14 -38,18
      q -28,-4 -38,-18 Z

      M102,258
      a 14,14 0 0 1 28,0 v120
      a 14,14 0 0 1 -28,0 Z

      M130,258
      a 14,14 0 0 1 28,0 v120
      a 14,14 0 0 1 -28,0 Z

      M106,378
      a 11,11 0 0 1 22,0 v108
      a 11,11 0 0 1 -22,0 Z

      M132,378
      a 11,11 0 0 1 22,0 v108
      a 11,11 0 0 1 -22,0 Z

      M99,494
      a 18,10 0 1 0 36,0 a 18,10 0 1 0 -36,0 Z

      M130,494
      a 18,10 0 1 0 36,0 a 18,10 0 1 0 -36,0 Z
    `;

    svg.innerHTML = `
      <defs>${clip}</defs>

      <!-- Region bands (horizontal) -->
      <!-- Head & Neck -->
      <rect x="40" y="0"   width="180" height="120" clip-path="url(#humanClip)" fill="${fills["Head & Neck"]}"/>
      <!-- Chest & Abdomen -->
      <rect x="40" y="120" width="180" height="120" clip-path="url(#humanClip)" fill="${fills["Chest & Abdomen"]}"/>
      <!-- Knee/Femur & Pelvis -->
      <rect x="40" y="240" width="180" height="130" clip-path="url(#humanClip)" fill="${fills["Knee/Femur & Pelvis"]}"/>
      <!-- Lower Leg -->
      <rect x="40" y="370" width="180" height="190" clip-path="url(#humanClip)" fill="${fills["Lower Leg"]}"/>

      <!-- Visible outline (medium thickness for presentation) -->
      <path d="${outline}"
            fill="none" stroke="var(--ink)"
            stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    `;
  }

  refresh();
  setInterval(refresh, 1000);
</script>

</body>
</html>
