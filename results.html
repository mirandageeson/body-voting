<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Live Results</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      --ink:#111827;
      --bg:#f7f7f7;
    }
    body {
      font-family: Arial, Helvetica, sans-serif;
      padding: 24px;
      text-align: center;
      background: var(--bg);
      position: relative;
    }
    #sil { width: clamp(200px, 22vw, 300px); margin:auto; display:block; }
    .note { color:#6b7280; font-size:14px; margin-top:10px; }
    h2 { margin-bottom:12px; }

    /* Reset button */
    #resetVotesBtn {
      position:absolute;
      top:16px;
      right:16px;
      background:none;
      border:1px solid transparent;
      border-radius:8px;
      cursor:pointer;
      padding:6px;
    }
    #resetVotesBtn:hover { border-color:#ddd; }
    #resetVotesBtn[disabled] { opacity:.5; cursor:not-allowed; }
  </style>
</head>
<body>

<button id="resetVotesBtn" title="Reset all votes">
  <svg width="30" height="30" viewBox="0 0 24 24" fill="none"
       stroke="#555" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="1 4 1 10 7 10"></polyline>
    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
  </svg>
</button>

<h2>Live Results</h2>

<svg id="sil" viewBox="0 0 1505 4279" preserveAspectRatio="xMidYMid meet"></svg>

<div class="note">Colours update automatically as votes come in.</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js";

const SUPABASE_URL  = "https://awrcxuahafelpmhnwekm.supabase.co";
const SUPABASE_ANON = "sb_publishable_09CHP1nkTxUbdQgNNLmdSA_w3fV4tE-";
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

const COLOURS = {
  green : "#2ecc71",
  yellow: "#f1c40f",
  orange: "#e67e22",
  brown : "#8e5c2a",
  red   : "#e74c3c"
};

let refreshTimer = null;
let forceWhite = false;   // ← key flag!

// -------------- RESET LOGIC (this now **works**) ----------------
async function resetVotes() {
  if (!confirm("Reset ALL votes?")) return;

  const btn = document.getElementById("resetVotesBtn");
  btn.disabled = true;

  // Stop refresh loop temporarily
  if (refreshTimer) clearInterval(refreshTimer);

  // Delete all rows
  const { error } = await supabase
    .from("votes")
    .delete()
    .not("region", "is", null);

  if (error) {
    console.error(error);
    alert("Error resetting votes");
    btn.disabled = false;
    refreshTimer = setInterval(refresh, 1000);
    return;
  }

  // FORCE white dummy until new votes appear
  forceWhite = true;

  drawSilhouette({
    "Head & Neck":    "#ffffff",
    "Chest & Abdomen":"#ffffff",
    "Knee/Femur & Pelvis":"#ffffff",
    "Lower Leg":"#ffffff"
  });

  // resume auto-refresh
  refreshTimer = setInterval(refresh, 1000);
  btn.disabled = false;
  alert("Votes reset.");
}

document.getElementById("resetVotesBtn").addEventListener("click", resetVotes);


// ----------------- REFRESH (fixed) -----------------
async function refresh() {
  const { data, error } = await supabase.from("votes").select("region,colour");
  if (error) { console.error(error); return; }

  // Count votes
  const regions = {
    "Head & Neck":         { green:0,yellow:0,orange:0,brown:0,red:0 },
    "Chest & Abdomen":     { green:0,yellow:0,orange:0,brown:0,red:0 },
    "Knee/Femur & Pelvis": { green:0,yellow:0,orange:0,brown:0,red:0 },
    "Lower Leg":           { green:0,yellow:0,orange:0,brown:0,red:0 }
  };

  for (const v of data) {
    if (regions[v.region]) regions[v.region][v.colour]++;
  }

  // Count total votes
  const totalVotes = Object.values(regions)
    .reduce((sum, r)=> sum+r.green+r.yellow+r.orange+r.brown+r.red, 0);

  // If dummy is in "forceWhite" mode AND still no votes → keep white
  if (forceWhite && totalVotes === 0) {
    drawSilhouette({
      "Head & Neck":    "#ffffff",
      "Chest & Abdomen":"#ffffff",
      "Knee/Femur & Pelvis":"#ffffff",
      "Lower Leg":"#ffffff"
    });
    return;
  }

  // If no votes but NOT in reset state → still white
  if (totalVotes === 0) {
    drawSilhouette({
      "Head & Neck":    "#ffffff",
      "Chest & Abdomen":"#ffffff",
      "Knee/Femur & Pelvis":"#ffffff",
      "Lower Leg":"#ffffff"
    });
    return;
  }

  // Votes exist → stop forceWhite mode
  forceWhite = false;

  // Build fill map
  const fillMap = {};
  for (const r in regions) {
    const counts = regions[r];
    const top = Object.keys(counts).reduce((a,b)=> counts[a] > counts[b] ? a : b);
    fillMap[r] = COLOURS[top];
  }

  drawSilhouette(fillMap);
}


// --------- DRAW SILHOUETTE (YOUR PATH KEPT UNCHANGED) ---------
function drawSilhouette(fills){
  const svg = document.getElementById("sil");

  const SILHOUETTE_D = `
M810.401 5.14258L852.698 25.7754L895.561 56.0312L896.165 56.457L917.628 82.5205L949.722 121.343
... (KEEP YOUR FULL PATH HERE EXACTLY AS-IS)
L810.401 5.14258Z
`.trim();

  const VB_W = 1505;
  const VB_H = 4279;
  const PAD = VB_H * 0.06;
  const usable = VB_H - PAD * 2;

  const H1 = usable * 0.08;
  const H2 = usable * 0.26;
  const H3 = usable * 0.26;
  const H4 = usable * 0.40;

  const Y1 = PAD;
  const Y2 = Y1 + H1;
  const Y3 = Y2 + H2;
  const Y4 = Y3 + H3;

  svg.innerHTML = `
    <defs>
      <clipPath id="humanClip" clipPathUnits="userSpaceOnUse">
        <path d="${SILHOUETTE_D}"/>
      </clipPath>
    </defs>

    <rect x="0" y="${Y1}" width="${VB_W}" height="${H1}" clip-path="url(#humanClip)" fill="${fills["Head & Neck"]}"/>
    <rect x="0" y="${Y2}" width="${VB_W}" height="${H2}" clip-path="url(#humanClip)" fill="${fills["Chest & Abdomen"]}"/>
    <rect x="0" y="${Y3}" width="${VB_W}" height="${H3}" clip-path="url(#humanClip)" fill="${fills["Knee/Femur & Pelvis"]}"/>
    <rect x="0" y="${Y4}" width="${VB_W}" height="${H4}" clip-path="url(#humanClip)" fill="${fills["Lower Leg"]}"/>

    <path d="${SILHOUETTE_D}" fill="none" stroke="var(--ink)" stroke-width="36"
          stroke-linejoin="round" stroke-linecap="round"/>
  `;
}


// Start auto-refresh
refresh();
refreshTimer = setInterval(refresh, 1000);

</script>

</body>
</html>
