<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Live Results</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --ink:#111827;  /* outline stroke */
      --bg:#f7f7f7;   /* page background */
    }
    body{
      font-family: Arial, Helvetica, sans-serif;
      padding: 24px;
      text-align: center;
      background: var(--bg);
    }
    #sil{ width: clamp(260px, 40vw, 420px); margin:auto; display:block; }
    .note{ color:#6b7280; font-size:14px; margin-top:10px; }
    h2 { margin-bottom: 12px; }
  </style>
</head>
<body>

<h2>Live Results</h2>
<!-- Use a taller viewBox matching the path coordinates below -->
<svg id="sil" viewBox="0 0 260 560" role="img" aria-label="Standing human silhouette"></svg>
<div class="note">Colours update automatically as votes come in.</div>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js";

  // Supabase credentials (keep your real ones here)
  const SUPABASE_URL  = "https://awrcxuahafelpmhnwekm.supabase.co";
  const SUPABASE_ANON = "sb_publishable_09CHP1nkTxUbdQgNNLmdSA_w3fV4tE-";
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

  const COLOURS = {
    green : "#2ecc71",
    yellow: "#f1c40f",
    orange: "#e67e22",
    brown : "#8e5c2a",
    red   : "#e74c3c"
  };

  async function refresh(){
    const { data, error } = await supabase.from("votes").select("region,colour");
    if (error) return;

    const regions = {
      "Head & Neck":         { green:0,yellow:0,orange:0,brown:0,red:0 },
      "Chest & Abdomen":     { green:0,yellow:0,orange:0,brown:0,red:0 },
      "Knee/Femur & Pelvis": { green:0,yellow:0,orange:0,brown:0,red:0 },
      "Lower Leg":           { green:0,yellow:0,orange:0,brown:0,red:0 }
    };

    for (const v of data) {
      if (regions[v.region] && COLOURS[v.colour]) {
        regions[v.region][v.colour]++;
      }
    }

    const fillMap = {};
    for (const r in regions) {
      const counts = regions[r];
      const top = Object.keys(counts).reduce((a,b)=> counts[a] > counts[b] ? a : b);
      fillMap[r] = COLOURS[top];
    }

    drawSilhouette(fillMap);
  }

  // --- ONE fully-enclosed silhouette path (feet angled outward; visible neck) ---
  function drawSilhouette(fills){
    const svg = document.getElementById("sil");

    const SILHOUETTE_D = `
      M130 18
      C 151 18 168 36 168 60
      C 168 84 152 100 138 102
      C 138 108 154 114 174 126
      C 198 140 202 168 188 190
      C 178 206 166 214 158 218
      C 164 236 166 258 166 292
      C 166 356 164 434 164 484
      C 164 502 152 512 140 514
      C 136 514 132 518 130 520
      C 128 518 124 514 120 514
      C 108 512 96 502 96 484
      C 96 434 94 356 94 292
      C 94 258 96 236 102 218
      C 94 214 82 206 72 190
      C 58 168 62 140 86 126
      C 106 114 122 108 122 102
      C 108 100 92 84 92 60
      C 92 36 109 18 130 18 Z
    `;

    svg.innerHTML = `
      <defs>
        <clipPath id="humanClip" clipPathUnits="userSpaceOnUse">
          <path d="${SILHOUETTE_D}"/>
        </clipPath>
      </defs>

      <!-- Horizontal region bands (use *real* & in keys) -->
      <rect x="40" y="0"   width="180" height="120" clip-path="url(#humanClip)" fill="${fills["Head & Neck"]}"/>
      <rect x="40" y="120" width="180" height="120" clip-path="url(#humanClip)" fill="${fills["Chest & Abdomen"]}"/>
      <rect x="40" y="240" width="180" height="130" clip-path="url(#humanClip)" fill="${fills["Knee/Femur & Pelvis"]}"/>
      <rect x="40" y="370" width="180" height="190" clip-path="url(#humanClip)" fill="${fills["Lower Leg"]}"/>

      <!-- Clean outline on top -->
      <path d="${SILHOUETTE_D}"
            fill="none" stroke="var(--ink)"
            stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    `;
  }

  // initial + interval refresh
  refresh();
  setInterval(refresh, 1000);
</script>

</body>
</html>
