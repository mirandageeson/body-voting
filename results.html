<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Live Results</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --ink:#111827;        /* outline stroke */
      --bg:#f7f7f7;         /* page background */
    }
    body{
      font-family: Arial, Helvetica, sans-serif;
      padding: 24px;
      text-align: center;
      background: var(--bg);
    }
    #sil{ width: clamp(260px, 40vw, 420px); margin:auto; display:block;}
    .note{ color:#6b7280; font-size:14px; margin-top:10px;}
    h2 { margin-bottom: 12px; }
  </style>
</head>
<body>

<h2>Live Results</h2>
<svg id="sil" viewBox="0 0 300 460" role="img" aria-label="Seated dummy silhouette (arms on thighs)"></svg>
<div class="note">Colours update automatically as votes come in.</div>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js";

  // ⬇️ REPLACE these two with your real Supabase values
  const SUPABASE_URL = "https://awrcxuahafelpmhnwekm.supabase.co";
  const SUPABASE_ANON = "sb_publishable_09CHP1nkTxUbdQgNNLmdSA_w3fV4tE-";

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

  const COLOURS = {
    green : "#2ecc71",
    yellow: "#f1c40f",
    orange: "#e67e22",
    brown : "#8e5c2a",
    red   : "#e74c3c"
  };

  async function refresh(){
    const { data, error } = await supabase.from("votes").select("region,colour");
    if (error) return;

    const regions = {
      "Head & Neck":         { green:0,yellow:0,orange:0,brown:0,red:0 },
      "Chest & Abdomen":     { green:0,yellow:0,orange:0,brown:0,red:0 },
      "Knee/Femur & Pelvis": { green:0,yellow:0,orange:0,brown:0,red:0 },
      "Lower Leg":           { green:0,yellow:0,orange:0,brown:0,red:0 }
    };
    for(const v of data){ if(regions[v.region] && COLOURS[v.colour]!==undefined){ regions[v.region][v.colour]++; } }

    const fillMap = {};
    for(const r in regions){
      const counts = regions[r];
      const top = Object.keys(counts).reduce((a,b)=>counts[a] > counts[b] ? a : b);
      fillMap[r] = COLOURS[top];
    }
    drawSilhouette(fillMap);
  }

  function drawSilhouette(fills){
    const svg = document.getElementById("sil");

    /*  Silhouette: seated dummy, arms resting on thighs.
        - Blocky geometric parts (rects + polygons) with small overlaps (no gaps).
        - The clipPath is the union of components; rectangles for region bands sit behind and get clipped cleanly.
        - Proportions chosen to match your reference posture.
    */

    const clip = `
      <clipPath id="humanClip" clipPathUnits="userSpaceOnUse">
        <!-- HEAD (rounded rectangle) -->
        <rect x="127" y="20" width="46" height="56" rx="10" ry="10"/>
        <!-- NECK -->
        <rect x="139" y="76" width="22" height="18"/>

        <!-- UPPER TORSO (slightly wider shoulders) -->
        <polygon points="
          92,96   208,96
          208,156 92,156
        "/>

        <!-- UPPER ARMS (angle slightly outward) -->
        <polygon points="92,100 110,100 104,145 88,142"/>
        <polygon points="208,100 190,100 196,145 212,142"/>

        <!-- ELBOWS / FOREARMS (angle inward, down to thighs) -->
        <polygon points="88,142 104,145 120,182 106,190 92,170 82,160"/>
        <polygon points="212,142 196,145 180,182 194,190 208,170 218,160"/>

        <!-- HANDS resting on thighs (small pads) -->
        <rect x="100" y="188" width="18" height="14" rx="4" ry="4"/>
        <rect x="182" y="188" width="18" height="14" rx="4" ry="4"/>

        <!-- PELVIS (short block with slight round) -->
        <rect x="120" y="160" width="60" height="30" rx="10" ry="10"/>

        <!-- THIGHS (wide, splayed slightly outward) -->
        <polygon points="78,170 140,170 140,215 85,215 75,206 70,188"/>
        <polygon points="222,170 160,170 160,215 215,215 225,206 230,188"/>

        <!-- SHINS (vertical) -->
        <rect x="101" y="215" width="30" height="120" rx="12" ry="12"/>
        <rect x="169" y="215" width="30" height="120" rx="12" ry="12"/>

        <!-- FEET (flat-ish rounded blocks) -->
        <rect x="92"  y="335" width="48" height="22" rx="10" ry="10"/>
        <rect x="168" y="335" width="48" height="22" rx="10" ry="10"/>
      </clipPath>
    `;

    /* Outline: a clean continuous stroke approximating the same union.
       (Drawn in sections but visually reads as one outline.)
    */
    const outline = `
      M127,20 h46 v56 h-46 z         /* head */
      M139,76 h22 v18 h-22 z         /* neck */

      /* torso block */
      M92,96 H208 V156 H92 Z

      /* left upper arm + forearm to thigh */
      M92,100 L110,100 L104,145 L120,182 L106,190 L92,170 L82,160 Z
      /* right upper arm + forearm to thigh */
      M208,100 L190,100 L196,145 L180,182 L194,190 L208,170 L218,160 Z

      /* hands */
      M100,188 h18 v14 h-18 z
      M182,188 h18 v14 h-18 z

      /* pelvis */
      M120,160 h60 v30 h-60 z

      /* thighs */
      M78,170 L140,170 L140,215 L85,215 L75,206 L70,188 Z
      M222,170 L160,170 L160,215 L215,215 L225,206 L230,188 Z

      /* shins */
      M101,215 h30 v120 h-30 z
      M169,215 h30 v120 h-30 z

      /* feet */
      M92,335 h48 v22 h-48 z
      M168,335 h48 v22 h-48 z
    `;

    svg.innerHTML = `
      <defs>${clip}</defs>

      <!-- Region bands mapped to Option-1 -->
      <!-- Head & Neck -->
      <rect x="40" y="0"   width="220" height="110" clip-path="url(#humanClip)" fill="${fills["Head & Neck"]}"/>
      <!-- Chest & Abdomen -->
      <rect x="40" y="110" width="220" height="90"  clip-path="url(#humanClip)" fill="${fills["Chest & Abdomen"]}"/>
      <!-- Knee/Femur & Pelvis -->
      <rect x="40" y="200" width="220" height="90"  clip-path="url(#humanClip)" fill="${fills["Knee/Femur & Pelvis"]}"/>
      <!-- Lower Leg -->
      <rect x="40" y="290" width="220" height="170" clip-path="url(#humanClip)" fill="${fills["Lower Leg"]}"/>

      <!-- Visible outline -->
      <path d="${outline}"
            fill="none" stroke="var(--ink)"
            stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    `;
  }

  refresh();
  setInterval(refresh, 1000);
</script>

</body>
</html>
