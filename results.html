<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Live Results</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --ink:#111827;        /* outline stroke */
      --bg:#f7f7f7;         /* page background */
    }
    body{
      font-family: Arial, Helvetica, sans-serif;
      padding: 24px;
      text-align: center;
      background: var(--bg);
    }
    #sil{ width: clamp(240px, 36vw, 360px); margin:auto; display:block;}
    .note{ color:#6b7280; font-size:14px; margin-top:8px;}
  </style>
</head>
<body>

<h2>Live Results</h2>
<svg id="sil" viewBox="0 0 260 520" role="img" aria-label="Human silhouette with arms slightly out"></svg>
<div class="note">Colours update automatically as votes come in.</div>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js";

  // ⬇️ REPLACE these two with your real Supabase values
  const SUPABASE_URL = "https://awrcxuahafelpmhnwekm.supabase.co";
  const SUPABASE_ANON = "sb_publishable_09CHP1nkTxUbdQgNNLmdSA_w3fV4tE-";

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

  const COLOURS = {
    green : "#2ecc71",
    yellow: "#f1c40f",
    orange: "#e67e22",
    brown : "#8e5c2a",
    red   : "#e74c3c"
  };

  async function refresh(){
    const { data, error } = await supabase.from("votes").select("region,colour");
    if (error) return;

    const regions = {
      "Head & Neck":         { green:0,yellow:0,orange:0,brown:0,red:0 },
      "Chest & Abdomen":     { green:0,yellow:0,orange:0,brown:0,red:0 },
      "Knee/Femur & Pelvis": { green:0,yellow:0,orange:0,brown:0,red:0 },
      "Lower Leg":           { green:0,yellow:0,orange:0,brown:0,red:0 }
    };
    for(const v of data){ if(regions[v.region] && COLOURS[v.colour]!==undefined){ regions[v.region][v.colour]++; } }

    const fillMap = {};
    for(const r in regions){
      const counts = regions[r];
      const top = Object.keys(counts).reduce((a,b)=>counts[a] > counts[b] ? a : b);
      fillMap[r] = COLOURS[top];
    }
    drawSilhouette(fillMap);
  }

  function drawSilhouette(fills){
  const svg = document.getElementById("sil");

  const clip = `
    <clipPath id="humanClip" clipPathUnits="userSpaceOnUse">

      <!-- HEAD -->
      <rect x="105" y="15" width="50" height="60" rx="10" ry="10"/>

      <!-- NECK -->
      <rect x="118" y="75" width="24" height="20" />

      <!-- UPPER TORSO -->
      <rect x="80" y="95" width="100" height="70" rx="10" ry="10"/>

      <!-- ARMS (resting on thighs) -->
      <rect x="60"  y="105" width="20"  height="90" rx="6" ry="6"/>
      <rect x="180" y="105" width="20"  height="90" rx="6" ry="6"/>

      <!-- FOREARMS ANGLED -->
      <polygon points="60,165 80,185 75,205 55,190" />
      <polygon points="200,165 180,185 185,205 205,190" />

      <!-- PELVIS -->
      <rect x="95" y="165" width="70" height="50" rx="12" ry="12"/>

      <!-- THIGHS (seated) -->
      <rect x="70"  y="185" width="60" height="55" rx="12" ry="12"/>
      <rect x="130" y="185" width="60" height="55" rx="12" ry="12"/>

      <!-- LOWER LEGS -->
      <rect x="85"  y="240" width="35" height="110" rx="10" ry="10"/>
      <rect x="140" y="240" width="35" height="110" rx="10" ry="10"/>

      <!-- FEET -->
      <ellipse cx="102" cy="355" rx="20" ry="12"/>
      <ellipse cx="158" cy="355" rx="20" ry="12"/>

    </clipPath>
  `;

  const outline = `
    M130 15 h25 v60 h-25 Z               /* head */
    M118 75 h24 v20 h-24 Z               /* neck */
    M80 95 h100 v70 h-100 Z              /* upper torso */
    M60 105 h20 v90 h-20 Z               /* left upper arm */
    M180 105 h20 v90 h-20 Z              /* right upper arm */
    M60 165 L80 185 L75 205 L55 190 Z    /* left forearm */
    M200 165 L180 185 L185 205 L205 190 Z/* right forearm */
    M95 165 h70 v50 h-70 Z               /* pelvis */
    M70 185 h60 v55 h-60 Z               /* left thigh */
    M130 185 h60 v55 h-60 Z              /* right thigh */
    M85 240 h35 v110 h-35 Z              /* left shin */
    M140 240 h35 v110 h-35 Z             /* right shin */
    M82 355 a20 12 0 1 0 40 0 a20 12 0 1 0 -40 0 Z /* left foot */
    M138 355 a20 12 0 1 0 40 0 a20 12 0 1 0 -40 0 Z/* right foot */
  `;

  svg.innerHTML = `
     <defs>${clip}</defs>

     <!-- REGION BANDS -->
     <rect x="40" y="0"   width="180" height="120" clip-path="url(#humanClip)" fill="${fills["Head & Neck"]}" />
     <rect x="40" y="120" width="180" height="100" clip-path="url(#humanClip)" fill="${fills["Chest & Abdomen"]}" />
     <rect x="40" y="220" width="180" height="90"  clip-path="url(#humanClip)" fill="${fills["Knee/Femur & Pelvis"]}" />
     <rect x="40" y="310" width="180" height="150" clip-path="url(#humanClip)" fill="${fills["Lower Leg"]}" />

     <!-- OUTLINE -->
     <path d="${outline}"
           fill="none"
           stroke="#000"
           stroke-width="3"
           stroke-linejoin="round"
           stroke-linecap="round" />
  `;
}

  // initial + interval refresh
  refresh();
  setInterval(refresh, 1000);
</script>

</body>
</html>
