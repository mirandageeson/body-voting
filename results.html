<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Live Results</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --ink:#111827;  /* outline stroke */
      --bg:#f7f7f7;   /* page background */
    }
    body{
      font-family: Arial, Helvetica, sans-serif;
      padding: 24px;
      text-align: center;
      background: var(--bg);
    }
    #sil { width: clamp(200px, 22vw, 300px); margin:auto; display:block; }
    .note{ color:#6b7280; font-size:14px; margin-top:10px; }
    h2 { margin-bottom: 12px; }
  </style>
</head>
<body>

<h2>Live Results</h2>
<!-- Use a taller viewBox matching the path coordinates below -->
<svg id="sil" viewBox="0 0 1505 4279" preserveAspectRatio="xMidYMid meet"></svg>
<div class="note">Colours update automatically as votes come in.</div>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js";

  // Supabase credentials (keep your real ones here)
  const SUPABASE_URL  = "https://awrcxuahafelpmhnwekm.supabase.co";
  const SUPABASE_ANON = "sb_publishable_09CHP1nkTxUbdQgNNLmdSA_w3fV4tE-";
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

  const COLOURS = {
    green : "#2ecc71",
    yellow: "#f1c40f",
    orange: "#e67e22",
    brown : "#8e5c2a",
    red   : "#e74c3c"
  };

  async function refresh(){
    const { data, error } = await supabase.from("votes").select("region,colour");
    if (error) return;

    const regions = {
      "Head & Neck":         { green:0,yellow:0,orange:0,brown:0,red:0 },
      "Chest & Abdomen":     { green:0,yellow:0,orange:0,brown:0,red:0 },
      "Knee/Femur & Pelvis": { green:0,yellow:0,orange:0,brown:0,red:0 },
      "Lower Leg":           { green:0,yellow:0,orange:0,brown:0,red:0 }
    };

    for (const v of data) {
      if (regions[v.region] && COLOURS[v.colour]) {
        regions[v.region][v.colour]++;
      }
    }

    const fillMap = {};
    for (const r in regions) {
      const counts = regions[r];
      const top = Object.keys(counts).reduce((a,b)=> counts[a] > counts[b] ? a : b);
      fillMap[r] = COLOURS[top];
    }

    drawSilhouette(fillMap);
  }

  // --- ONE fully-enclosed silhouette path (feet angled outward; visible neck) ---
function drawSilhouette(fills){
  const svg = document.getElementById("sil");

  // Your silhouette path
  const SILHOUETTE_D = `
    M810.401 5.14258L852.698 25.7754L895.561 56.0312L896.165 56.457L...
    ... entire path ...
    ...L810.401 5.14258Z
  `;

  // Coordinate system from your Figma export
  const VB_W = 1505;
  const VB_H = 4279;

  // Padding above & below the colour bands
  const PAD = VB_H * 0.06;
  const usable = VB_H - PAD * 2;

  // Better anatomical percentages for your tall figure
  const H1 = usable * 0.08;   // Head & neck
  const H2 = usable * 0.26;   // Chest & abdomen
  const H3 = usable * 0.26;   // Pelvis + upper legs
  const H4 = usable * 0.40;   // Lower legs

  // Y positions
  const Y1 = PAD;
  const Y2 = Y1 + H1;
  const Y3 = Y2 + H2;
  const Y4 = Y3 + H3;

  svg.innerHTML = `
    <defs>
      <clipPath id="humanClip" clipPathUnits="userSpaceOnUse">
        <path d="${SILHOUETTE_D}"/>
      </clipPath>
    </defs>

    <!-- Horizontal region bands -->
    <rect x="0" y="${Y1}" width="${VB_W}" height="${H1}" clip-path="url(#humanClip)" fill="${fills["Head & Neck"]}"/>
    <rect x="0" y="${Y2}" width="${VB_W}" height="${H2}" clip-path="url(#humanClip)" fill="${fills["Chest & Abdomen"]}"/>
    <rect x="0" y="${Y3}" width="${VB_W}" height="${H3}" clip-path="url(#humanClip)" fill="${fills["Knee/Femur & Pelvis"]}"/>
    <rect x="0" y="${Y4}" width="${VB_W}" height="${H4}" clip-path="url(#humanClip)" fill="${fills["Lower Leg"]}"/>

    <!-- Outline -->
    <path d="${SILHOUETTE_D}" fill="none" stroke="#111827" stroke-width="36"
          stroke-linejoin="round" stroke-linecap="round"/>
  `;
}

  // initial + interval refresh
  refresh();
  setInterval(refresh, 1000);
</script>

</body>
</html>
